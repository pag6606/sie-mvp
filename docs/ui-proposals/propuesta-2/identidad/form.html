<!DOCTYPE html>
<html lang="es" class="h-full">
<head>
  <meta charset="UTF-8">
  <title>Usuario — SIE</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <script>
    tailwind.config = { theme: { extend: { colors: { primary: { DEFAULT: '#06B6D4', foreground: '#0F172A' } }, fontFamily: { sans: ['DM Sans', 'sans-serif'] } } } }
  </script>
  <style>
    body { font-family: 'DM Sans', sans-serif; background: #0F172A; color: #F1F5F9; }
    .btn-primary { @apply bg-cyan-600 hover:bg-cyan-500 text-white font-semibold px-4 py-2.5 rounded-lg text-sm transition-colors inline-flex items-center gap-2; }
    .btn-outline { @apply border border-slate-700 hover:bg-slate-700 text-slate-100 font-semibold px-4 py-2.5 rounded-lg text-sm transition-colors inline-flex items-center gap-2; }
    .input { background: #1E293B; border: 1px solid #334155; color: #F1F5F9; border-radius: 8px; padding: 10px 12px; font-size: 14px; outline: none; transition: border-color .15s, box-shadow .15s; width: 100%; }
    .input:focus { border-color: #06B6D4; box-shadow: 0 0 0 3px rgba(6,182,212,0.15); }
    .input::placeholder { color: #64748B; }
    .label { @apply block text-sm font-medium text-slate-300 mb-1.5; }
    .select { background: #1E293B; border: 1px solid #334155; color: #F1F5F9; border-radius: 8px; padding: 10px 12px; font-size: 14px; outline: none; transition: border-color .15s, box-shadow .15s; width: 100%; cursor: pointer; }
    .select:focus { border-color: #06B6D4; box-shadow: 0 0 0 3px rgba(6,182,212,0.15); }
    .textarea { background: #1E293B; border: 1px solid #334155; color: #F1F5F9; border-radius: 8px; padding: 10px 12px; font-size: 14px; outline: none; transition: border-color .15s, box-shadow .15s; width: 100%; resize: vertical; min-height: 100px; }
    .textarea:focus { border-color: #06B6D4; box-shadow: 0 0 0 3px rgba(6,182,212,0.15); }
    .card { @apply bg-slate-800 rounded-xl border border-slate-700 shadow-sm; }
    .section-title { @apply text-sm font-semibold text-slate-200 mb-3 flex items-center gap-2; }
    .toggle-switch { position: relative; width: 44px; height: 24px; }
    .toggle-switch input { opacity: 0; width: 0; height: 0; }
    .toggle-slider { position: absolute; cursor: pointer; inset: 0; background-color: #334155; border-radius: 24px; transition: .3s; }
    .toggle-slider:before { position: absolute; content: ""; height: 18px; width: 18px; left: 3px; bottom: 3px; background-color: #F1F5F9; border-radius: 50%; transition: .3s; }
    input:checked + .toggle-slider { background-color: #06B6D4; }
    input:checked + .toggle-slider:before { transform: translateX(20px); }
  </style>
</head>
<body class="h-full">
<div class="flex h-screen overflow-hidden">
  <aside class="w-64 bg-slate-800 border-r border-slate-700 flex flex-col shrink-0">
    <div class="h-16 flex items-center px-4 border-b border-slate-700">
      <div class="flex items-center gap-2">
        <div class="w-8 h-8 bg-cyan-600 rounded-lg flex items-center justify-center">
          <svg class="w-4 h-4 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.747 0 3.332.477 4.5 1.253v13C19.832 18.477 18.247 18 16.5 18c-1.746 0-3.332.477-4.5 1.253"></path></svg>
        </div>
        <span class="font-semibold text-slate-100 text-sm">SIE</span>
      </div>
    </div>
    <nav class="flex-1 p-3 space-y-1 overflow-y-auto">
      <a href="../dashboard-admin.html" class="flex items-center gap-3 px-3 py-2 rounded-lg text-sm text-slate-400 hover:bg-slate-700 hover:text-slate-100 transition-colors cursor-pointer"><i data-lucide="layout-dashboard" class="w-4 h-4"></i> Dashboard</a>
      <a href="list.html" class="flex items-center gap-3 px-3 py-2 rounded-lg text-sm bg-cyan-500/10 text-cyan-400 font-semibold cursor-pointer"><i data-lucide="users" class="w-4 h-4"></i> Usuarios</a>
      <a href="../academico/list.html" class="flex items-center gap-3 px-3 py-2 rounded-lg text-sm text-slate-400 hover:bg-slate-700 hover:text-slate-100 transition-colors cursor-pointer"><i data-lucide="book-open" class="w-4 h-4"></i> Académico</a>
      <a href="../matricula/wizard.html" class="flex items-center gap-3 px-3 py-2 rounded-lg text-sm text-slate-400 hover:bg-slate-700 hover:text-slate-100 transition-colors cursor-pointer"><i data-lucide="clipboard-check" class="w-4 h-4"></i> Matrícula</a>
    </nav>
    <div class="p-3 border-t border-slate-700 relative">
      <button onclick="toggleUserMenu()" class="w-full flex items-center gap-2.5 px-2 py-2 rounded-lg hover:bg-slate-700 transition-colors group">
        <div class="w-8 h-8 bg-cyan-600 rounded-full flex items-center justify-center shrink-0"><span class="text-xs font-semibold text-white">AL</span></div>
        <div class="flex-1 min-w-0 text-left"><p class="text-xs font-semibold text-slate-100 truncate">Alma管理体系</p><p class="text-xs text-slate-500 truncate">Administrador</p></div>
        <i data-lucide="chevrons-up-down" class="w-3.5 h-3.5 text-slate-500 group-hover:text-slate-300 shrink-0"></i>
      </button>
      <div id="userMenu" class="hidden absolute bottom-full left-3 right-3 mb-1 bg-slate-800 border border-slate-700 rounded-xl shadow-lg z-50 overflow-hidden">
        <div class="px-4 py-3 bg-slate-700/50 border-b border-slate-700"><p class="text-sm font-semibold text-slate-100">Alma管理体系</p><p class="text-xs text-slate-500 mt-0.5">admin@sie.edu.ec</p></div>
        <div class="py-1"><button class="w-full flex items-center gap-3 px-4 py-2.5 text-sm text-red-400 hover:bg-red-500/10 transition-colors font-semibold" onclick="window.location.href='../index.html'"><i data-lucide="log-out" class="w-4 h-4"></i> Cerrar sesión</button></div>
      </div>
    </div>
  </aside>
  <main class="flex-1 flex flex-col overflow-hidden">
    <header class="h-16 bg-slate-800 border-b border-slate-700 flex items-center justify-between px-6 shrink-0">
      <nav class="flex items-center gap-1 text-sm text-slate-500"><a href="../dashboard-admin.html" class="hover:text-slate-300">Inicio</a><i data-lucide="chevron-right" class="w-3 h-3"></i><a href="list.html" class="hover:text-slate-300">Usuarios</a><i data-lucide="chevron-right" class="w-3 h-3"></i><span class="text-slate-100 font-semibold" id="headerTitle">Nuevo usuario</span></nav>
      <div class="flex items-center gap-2">
        <div class="w-px h-5 bg-slate-700"></div>
        <button onclick="toggleUserMenu()" class="flex items-center gap-2 pl-1 pr-3 py-1 hover:bg-slate-700 rounded-lg transition-colors"><div class="w-7 h-7 bg-cyan-600 rounded-full flex items-center justify-center"><span class="text-xs font-semibold text-white">AL</span></div><div class="text-left hidden sm:block"><p class="text-xs font-semibold text-slate-100 leading-tight">Alma管理体系</p><p class="text-xs text-slate-500 leading-tight">Administrador</p></div><i data-lucide="chevron-down" class="w-3 h-3 text-slate-500"></i></button>
      </div>
    </header>
    <div class="flex-1 overflow-y-auto p-6">
      <form id="userForm" onsubmit="handleSubmit(event)">
        <div class="max-w-3xl mx-auto">
          <div class="flex items-start justify-between mb-6">
            <div>
              <h1 class="text-xl font-bold text-slate-100" id="pageTitle">Nuevo usuario</h1>
              <p class="text-sm text-slate-500 mt-0.5" id="pageSubtitle">Complete la información del usuario</p>
            </div>
            <div class="flex items-center gap-2">
              <a href="list.html" class="btn-outline"><i data-lucide="arrow-left" class="w-4 h-4"></i> Cancelar</a>
              <button type="submit" class="btn-primary"><i data-lucide="save" class="w-4 h-4"></i> <span id="submitText">Guardar</span></button>
            </div>
          </div>

          <div class="grid grid-cols-2 gap-6">
            <div class="col-span-2 card p-5">
              <h2 class="section-title"><i data-lucide="user" class="w-4 h-4 text-cyan-500"></i> Datos Personales</h2>
              <div class="grid grid-cols-2 gap-4">
                <div>
                  <label class="label" for="nombres">Nombres *</label>
                  <input type="text" id="nombres" name="nombres" class="input" placeholder="Juan Carlos" required />
                </div>
                <div>
                  <label class="label" for="apellidos">Apellidos *</label>
                  <input type="text" id="apellidos" name="apellidos" class="input" placeholder="Pérez García" required />
                </div>
                <div>
                  <label class="label" for="cedula">Cédula / ID *</label>
                  <input type="text" id="cedula" name="cedula" class="input" placeholder="0923456789" required />
                </div>
                <div>
                  <label class="label" for="email">Correo electrónico *</label>
                  <input type="email" id="email" name="email" class="input" placeholder="usuario@colegio.edu.ec" required />
                </div>
                <div>
                  <label class="label" for="telefono">Teléfono</label>
                  <input type="tel" id="telefono" name="telefono" class="input" placeholder="0991234567" />
                </div>
              </div>
            </div>

            <div class="card p-5">
              <h2 class="section-title"><i data-lucide="shield" class="w-4 h-4 text-cyan-500"></i> Información de Cuenta</h2>
              <div class="space-y-4">
                <div>
                  <label class="label" for="rol">Rol *</label>
                  <select id="rol" name="rol" class="select" required>
                    <option value="">Seleccionar rol</option>
                    <option value="Administrador">Administrador</option>
                    <option value="Docente">Docente</option>
                    <option value="Estudiante">Estudiante</option>
                  </select>
                </div>
                <div>
                  <label class="label" for="estado">Estado</label>
                  <select id="estado" name="estado" class="select">
                    <option value="activo">Activo</option>
                    <option value="inactivo">Inactivo</option>
                    <option value="pendiente">Pendiente</option>
                  </select>
                </div>
              </div>
            </div>

            <div class="card p-5">
              <h2 class="section-title"><i data-lucide="settings" class="w-4 h-4 text-cyan-500"></i> Configuración</h2>
              <div class="space-y-4">
                <div>
                  <label class="label">¿Notificaciones habilitadas?</label>
                  <div class="flex items-center gap-3">
                    <label class="toggle-switch">
                      <input type="checkbox" id="notificaciones" name="notificaciones" checked />
                      <span class="toggle-slider"></span>
                    </label>
                    <label for="notificaciones" class="text-sm text-slate-400 cursor-pointer">Enviar notificaciones por correo</label>
                  </div>
                </div>
                <div>
                  <label class="label" for="notas">Notas / Observaciones</label>
                  <textarea id="notas" name="notas" class="textarea" placeholder="Notas adicionales sobre el usuario..."></textarea>
                </div>
              </div>
            </div>
          </div>
        </div>
      </form>
    </div>
  </main>
</div>

<div id="toast" class="hidden fixed bottom-5 right-5 z-50 bg-slate-800 text-slate-100 text-sm px-4 py-3 rounded-xl shadow-lg flex items-center gap-3 min-w-[260px] border border-slate-700">
  <i data-lucide="check-circle" class="w-4 h-4 text-emerald-400 shrink-0" id="toastIcon"></i>
  <span id="toastMsg">Cambios guardados</span>
</div>

<script>
lucide.createIcons();

const params = new URLSearchParams(window.location.search);
const mode = params.get('mode') || 'create';
const id = params.get('id');
const isEdit = mode === 'edit';

const MOCK_USER = {
  id: 1,
  nombres: 'Diana',
  apellidos: 'López',
  email: 'diana@colegio.edu.ec',
  cedula: '0923456789',
  telefono: '0991234567',
  rol: 'Docente',
  estado: 'activo',
  notificaciones: true,
  notas: 'Docente de matemáticas con 5 años de experiencia.'
};

const item = isEdit ? MOCK_USER : null;

if (isEdit && item) {
  document.getElementById('headerTitle').textContent = 'Editar usuario';
  document.getElementById('pageTitle').textContent = 'Editar usuario';
  document.getElementById('pageSubtitle').textContent = `Usuario: ${item.nombres} ${item.apellidos}`;
  document.getElementById('submitText').textContent = 'Guardar cambios';
  document.getElementById('nombres').value = item.nombres || '';
  document.getElementById('apellidos').value = item.apellidos || '';
  document.getElementById('cedula').value = item.cedula || '';
  document.getElementById('email').value = item.email || '';
  document.getElementById('telefono').value = item.telefono || '';
  document.getElementById('rol').value = item.rol || '';
  document.getElementById('estado').value = item.estado || 'activo';
  document.getElementById('notificaciones').checked = item.notificaciones !== false;
  document.getElementById('notas').value = item.notas || '';
}

function handleSubmit(e) {
  e.preventDefault();
  const form = document.getElementById('userForm');
  if (!form.checkValidity()) {
    form.reportValidity();
    return;
  }
  showToast(isEdit ? 'Usuario actualizado correctamente' : 'Usuario creado correctamente');
  setTimeout(() => { window.location.href = 'list.html'; }, 1500);
}

function showToast(msg) {
  document.getElementById('toastMsg').textContent = msg;
  document.getElementById('toast').classList.remove('hidden');
  setTimeout(() => { document.getElementById('toast').classList.add('hidden'); }, 3000);
}

function toggleUserMenu() {
  const menu = document.getElementById('userMenu');
  menu.classList.toggle('hidden');
}

document.addEventListener('click', function(e) {
  const userMenu = document.getElementById('userMenu');
  if (userMenu && !e.target.closest('[onclick="toggleUserMenu()"]')) {
    userMenu.classList.add('hidden');
  }
});
</script>
</body>
</html>
