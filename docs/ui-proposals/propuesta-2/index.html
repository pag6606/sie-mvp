<!DOCTYPE html>
<html lang="es" class="h-full">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Iniciar sesión — SIE</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    body { font-family: 'DM Sans', sans-serif; }
    .input-login {
      width: 100%; background: #1E293B; border: 1px solid #334155; color: #F1F5F9;
      border-radius: 8px; padding: 10px 12px 10px 40px; font-size: 14px; outline: none;
      transition: border-color 0.15s, box-shadow 0.15s;
    }
    .input-login::placeholder { color: #475569; }
    .input-login:focus { border-color: #06B6D4; box-shadow: 0 0 0 3px rgba(6,182,212,0.15); }
    .input-login.error { border-color: #EF4444; }
    .btn-login {
      width: 100%; background: #06B6D4; color: #0F172A; font-weight: 700;
      padding: 11px; border-radius: 8px; font-size: 14px; border: none;
      cursor: pointer; transition: background 0.15s;
      display: flex; align-items: center; justify-content: center; gap: 8px;
    }
    .btn-login:hover { background: #0891B2; color: white; }
    .btn-login:disabled { background: #164E63; color: #6B7280; cursor: not-allowed; }
  </style>
</head>
<body class="h-full" style="background:#0F172A;">
<div class="min-h-screen flex flex-col items-center justify-center px-4 py-12 relative overflow-hidden">

  <div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2
    w-96 h-96 bg-cyan-500/10 rounded-full blur-3xl pointer-events-none"></div>
  <div class="absolute top-0 right-0 w-64 h-64 bg-indigo-500/5 rounded-full blur-2xl pointer-events-none"></div>

  <div class="relative w-full max-w-sm">
    <div class="flex items-center justify-center gap-3 mb-8">
      <div class="w-10 h-10 bg-cyan-500/20 border border-cyan-500/30 rounded-xl
        flex items-center justify-center">
        <svg class="w-5 h-5 text-cyan-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.747 0 3.332.477 4.5 1.253v13C19.832 18.477 18.247 18 16.5 18c-1.746 0-3.332.477-4.5 1.253"></path>
        </svg>
      </div>
      <span class="text-white font-bold text-lg">SIE — Sistema de Información Estudiantil</span>
    </div>

    <div class="bg-slate-800/60 backdrop-blur-sm border border-slate-700 rounded-2xl p-7 shadow-2xl">
      <div class="mb-6">
        <h1 class="text-xl font-bold text-white">Iniciar sesión</h1>
        <p class="text-slate-400 text-sm mt-1">Ingresa tus credenciales</p>
      </div>

      <div id="errorAlert" class="hidden mb-4 flex items-start gap-3 bg-red-900/30
        border border-red-500/30 rounded-lg px-4 py-3">
        <i data-lucide="alert-circle" class="w-4 h-4 text-red-400 mt-0.5 shrink-0"></i>
        <p class="text-sm text-red-300" id="errorMsg">Credenciales incorrectas.</p>
      </div>

      <form onsubmit="handleLogin(event)" class="space-y-4">
        <div>
          <label class="block text-sm font-medium text-slate-300 mb-1.5">Correo</label>
          <div class="relative">
            <i data-lucide="mail" class="w-4 h-4 absolute left-3 top-1/2 -translate-y-1/2 text-slate-500"></i>
            <input id="email" type="email" class="input-login" placeholder="usuario@colegio.edu.ec" />
          </div>
        </div>
        <div>
          <div class="flex items-center justify-between mb-1.5">
            <label class="block text-sm font-medium text-slate-300">Contraseña</label>
            <button type="button" onclick="showForgotPassword()"
              class="text-xs text-cyan-400 hover:text-cyan-300 font-medium">
              ¿Olvidaste tu contraseña?
            </button>
          </div>
          <div class="relative">
            <i data-lucide="lock" class="w-4 h-4 absolute left-3 top-1/2 -translate-y-1/2 text-slate-500"></i>
            <input id="password" type="password" class="input-login" placeholder="••••••••" />
            <button type="button" onclick="togglePassword()"
              class="absolute right-3 top-1/2 -translate-y-1/2 text-slate-500 hover:text-slate-300">
              <i data-lucide="eye" class="w-4 h-4" id="eyeIcon"></i>
            </button>
          </div>
        </div>
        <div class="flex items-center gap-2">
          <input type="checkbox" id="remember" checked class="w-4 h-4 rounded border-slate-600 text-cyan-600 cursor-pointer bg-slate-700" />
          <label for="remember" class="text-sm text-slate-400 cursor-pointer">
            Mantener sesión iniciada
          </label>
        </div>
        <button type="submit" class="btn-login" id="loginBtn">
          <span id="loginText">Iniciar sesión</span>
        </button>
      </form>

      <div class="relative my-5">
        <div class="absolute inset-0 flex items-center">
          <div class="w-full border-t border-slate-700"></div>
        </div>
        <div class="relative flex justify-center">
          <span class="bg-slate-800/60 px-3 text-xs text-slate-500">o ingresa con</span>
        </div>
      </div>

      <button onclick="alert('[Mockup] SSO con Azure AD')"
        class="w-full flex items-center justify-center gap-3 border border-slate-600
          bg-slate-700/50 hover:bg-slate-700 text-slate-300 font-medium px-4 py-2.5
          rounded-lg text-sm transition-colors">
        <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
          <rect x="0" y="0" width="7.5" height="7.5" fill="#F25022"/>
          <rect x="8.5" y="0" width="7.5" height="7.5" fill="#7FBA00"/>
          <rect x="0" y="8.5" width="7.5" height="7.5" fill="#00A4EF"/>
          <rect x="8.5" y="8.5" width="7.5" height="7.5" fill="#FFB900"/>
        </svg>
        Continuar con Microsoft (SSO)
      </button>
    </div>

    <p class="text-center text-xs text-slate-600 mt-6">
      © 2025 SIE — Acceso restringido a usuarios autorizados
    </p>
  </div>
</div>

<!-- Modal: Recuperar contraseña -->
<div id="forgotModal" class="hidden fixed inset-0 bg-black/60 z-50 flex items-center justify-center">
  <div class="bg-slate-800 border border-slate-700 rounded-2xl shadow-2xl p-6 max-w-sm w-full mx-4">
    <div class="flex items-center gap-3 mb-4">
      <div class="w-10 h-10 bg-cyan-500/20 rounded-full flex items-center justify-center shrink-0">
        <i data-lucide="key-round" class="w-5 h-5 text-cyan-400"></i>
      </div>
      <div>
        <h3 class="font-semibold text-white">Recuperar contraseña</h3>
        <p class="text-xs text-slate-400">Te enviaremos un enlace a tu correo</p>
      </div>
    </div>
    <div class="relative mb-4">
      <i data-lucide="mail" class="w-4 h-4 absolute left-3 top-1/2 -translate-y-1/2 text-slate-500"></i>
      <input type="email" placeholder="usuario@colegio.edu.ec"
        class="w-full bg-slate-700 border border-slate-600 rounded-lg px-3 py-2 pl-9 text-sm
          text-slate-200 focus:outline-none focus:ring-2 focus:ring-cyan-500" />
    </div>
    <div class="flex gap-3">
      <button onclick="closeForgot()"
        class="flex-1 border border-slate-600 hover:bg-slate-700 text-slate-300
          font-medium px-4 py-2 rounded-lg text-sm transition-colors">
        Cancelar
      </button>
      <button onclick="sendReset()"
        class="flex-1 bg-cyan-600 hover:bg-cyan-500 text-white font-medium
          px-4 py-2 rounded-lg text-sm transition-colors">
        Enviar enlace
      </button>
    </div>
  </div>
</div>

<script>
  lucide.createIcons();

  const MOCK_USERS = [
    { email: 'admin@sie.edu.ec',    password: 'Admin123!', nombre: 'Alma管理体系',   rol: 'Administrador' },
    { email: 'diana@colegio.edu.ec', password: 'Docente1!', nombre: 'Diana López',     rol: 'Docente'      },
    { email: 'ernesto@colegio.edu.ec', password: 'Estudiante1!', nombre: 'Ernesto Vega', rol: 'Estudiante'       },
  ];

  function handleLogin(e) {
    e.preventDefault();
    const email    = document.getElementById('email').value.trim();
    const password = document.getElementById('password').value;
    const btn      = document.getElementById('loginBtn');
    const txt      = document.getElementById('loginText');

    btn.disabled = true;
    txt.textContent = 'Verificando...';

    setTimeout(() => {
      const user = MOCK_USERS.find(u => u.email === email && u.password === password);
      if (user) {
        txt.textContent = '¡Bienvenido!';
        setTimeout(() => {
          if (user.rol === 'Administrador') window.location.href = 'dashboard-admin.html';
          else if (user.rol === 'Docente') window.location.href = 'dashboard-docente.html';
          else window.location.href = 'dashboard-estudiante.html';
        }, 600);
      } else {
        btn.disabled = false;
        txt.textContent = 'Iniciar sesión';
        document.getElementById('errorAlert').classList.remove('hidden');
        document.getElementById('email').classList.add('error');
        document.getElementById('password').classList.add('error');
        document.getElementById('password').value = '';
      }
    }, 900);
  }

  function togglePassword() {
    const input = document.getElementById('password');
    const icon  = document.getElementById('eyeIcon');
    const isHidden = input.type === 'password';
    input.type = isHidden ? 'text' : 'password';
    icon.setAttribute('data-lucide', isHidden ? 'eye-off' : 'eye');
    lucide.createIcons();
  }

  function showForgotPassword() {
    document.getElementById('forgotModal').classList.remove('hidden');
  }
  function closeForgot() {
    document.getElementById('forgotModal').classList.add('hidden');
  }
  function sendReset() {
    closeForgot();
    const toast = document.createElement('div');
    toast.className = 'fixed top-4 right-4 z-50 bg-slate-800 border border-slate-700 shadow-lg ' +
      'rounded-lg px-4 py-3 flex items-center gap-3 text-sm text-slate-200';
    toast.innerHTML = '<svg xmlns="http://www.w3.org/2000/svg" class="w-4 h-4 text-emerald-400" ' +
      'viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">' +
      '<polyline points="20 6 9 17 4 12"/></svg> Enlace enviado a tu correo';
    document.body.appendChild(toast);
    setTimeout(() => toast.remove(), 3000);
  }

  ['email','password'].forEach(id => {
    document.getElementById(id)?.addEventListener('input', () => {
      document.getElementById('errorAlert').classList.add('hidden');
      document.getElementById(id).classList.remove('error');
    });
  });

  console.info('MOCKUP LOGIN SIE — Credenciales de prueba:\n' +
    MOCK_USERS.map(u => `  ${u.email} / ${u.password} (${u.rol})`).join('\n'));
</script>
</body>
</html>
