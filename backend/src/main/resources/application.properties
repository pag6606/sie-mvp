spring.application.name=sie
spring.profiles.active=dev

# JWT
app.jwt.secret=dev-secret-key-change-in-production-min-256-bits
app.jwt.expiration-ms=28800000

# Evaluación — umbral máximo por componente (LOEI + Reglamento de Evaluación)
# Cada componente de evaluación no puede exceder este porcentaje del total (100%)
app.evaluacion.max-peso-componente=${EVALUACION_MAX_PESO_COMPONENTE:40}

# Database (default profile - overridden by dev)
spring.datasource.url=${DATASOURCE_URL:jdbc:postgresql://localhost:5432/sie}
spring.datasource.username=${DATASOURCE_USERNAME:sie}
spring.datasource.password=${DATASOURCE_PASSWORD:sie_dev}
spring.jpa.hibernate.ddl-auto=validate
spring.flyway.enabled=true
