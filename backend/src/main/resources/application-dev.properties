spring.application.name=sie
server.address=0.0.0.0

# Database
spring.datasource.url=jdbc:postgresql://localhost:5432/sie
spring.datasource.username=sie
spring.datasource.password=sie_dev
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

# RabbitMQ
spring.rabbitmq.host=localhost
spring.rabbitmq.port=5672
spring.rabbitmq.username=sie
spring.rabbitmq.password=sie_dev

# Mailpit (SMTP mock for development)
spring.mail.host=localhost
spring.mail.port=1025
spring.mail.username=
spring.mail.password=
spring.mail.properties.mail.smtp.auth=false
spring.mail.properties.mail.smtp.starttls.enable=false

# JWT
app.jwt.secret=dev-secret-key-change-in-production-min-256-bits
app.jwt.expiration-ms=28800000
app.jwt.lopdp-expiration-ms=1200000

# Actuator
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=always

# OpenAPI
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
