spring.application.name=sie
server.address=0.0.0.0

# Database
spring.datasource.url=jdbc:postgresql://localhost:5432/sie
spring.datasource.username=sie
spring.datasource.password=sie_dev
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.jdbc.batch_size=50
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

# RabbitMQ
spring.rabbitmq.host=localhost
spring.rabbitmq.port=5672
spring.rabbitmq.username=sie
spring.rabbitmq.password=sie_dev

# Mailpit (SMTP mock for development)
spring.mail.host=localhost
spring.mail.port=1025
spring.mail.username=
spring.mail.password=
spring.mail.properties.mail.smtp.auth=false
spring.mail.properties.mail.smtp.starttls.enable=false

# LOPDP-EC integration (external consent service)
lopdp.url=http://localhost:3000/api/v1
lopdp.enabled=true
lopdp.api-key=${LOPDP_API_KEY:dev-sync-key-change-in-production}
lopdp.school-id=${LOPDP_SCHOOL_ID:default}
lopdp.rate-limit.enrollment-per-minute=100
lopdp.rate-limit.consent-per-minute=30

# File uploads
app.uploads.dir=uploads

# Evaluación — umbral máximo por componente (LOEI + Reglamento)
app.evaluacion.max-peso-componente=${EVALUACION_MAX_PESO_COMPONENTE:40}

# Alerta Temprana de Riesgo Académico (ADR-013)
app.riesgo.peso.rendimiento=0.50
app.riesgo.peso.asistencia=0.30
app.riesgo.peso.urgencia=0.10
app.riesgo.peso.completitud=0.05
app.riesgo.peso.frescura=0.05
app.riesgo.umbral-medio=30
app.riesgo.umbral-alto=50
app.riesgo.asistencia-umbral=85

# JWT
# ⚠️  En producción, NO usar este valor. Establecer variable de entorno JWT_SECRET.
# Coordinar el mismo valor con el equipo LOPDP-EC.
app.jwt.secret=${JWT_SECRET:dev-secret-key-change-in-production-min-256-bits}
app.jwt.expiration-ms=28800000
app.jwt.lopdp-expiration-ms=1200000

# Actuator
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=always

# OpenAPI
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
