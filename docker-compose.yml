version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: sie-postgres
    environment:
      POSTGRES_DB: sie
      POSTGRES_USER: sie
      POSTGRES_PASSWORD: sie_dev
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sie"]
      interval: 5s
      timeout: 5s
      retries: 5

  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: sie-rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: sie
      RABBITMQ_DEFAULT_PASS: sie_dev
    ports:
      - "5672:5672"
      - "15672:15672"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "check_port_connectivity"]
      interval: 5s
      timeout: 5s
      retries: 5

  mailpit:
    image: axllent/mailpit:latest
    container_name: sie-mailpit
    ports:
      - "1025:1025"
      - "8025:8025"
    environment:
      MP_MAX_MESSAGES: 5000
      MP_DATA_FILE: /data/mailpit.db
      MP_SMTP_AUTH_ACCEPT_ANY: "true"
    volumes:
      - mailpit_data:/data

volumes:
  postgres_data:
  mailpit_data:
